name: Deploy

on:
  push:
    branches:
      -main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: bring the code.
        run: |
          git clone http://192.168.56.3:3000/eugene/seoyon-project.git .


      - name: remove existed container
        run: docker -rm -f seoyon-project || true

      - name: Docker build
        run: docker build -t seoyon-project

      - name: start container 
        runL docker run -d --name seoyon-project -p 5000:5000 seoyon-project       
