<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - SEOYEON TOUR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 배너 유지 */
        .navbar {
            border-bottom: 1px solid #eee;
        }

        /* 중앙 정렬 컨테이너 */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 110px; /* 네비바 높이 고려 */
            padding-bottom: 60px;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px; /* 조금 더 컴팩트하게 조절 */
            padding: 20px;
        }

        /* Welcome! 타이틀 스타일 */
        .welcome-title {
            font-size: 3.2rem;
            font-weight: 400;
            color: #4a6fa5;
            text-align: center;
            margin-bottom: 45px;
            letter-spacing: -1px;
        }

        /* 입력창 라벨 및 스타일 */
        .form-group-custom {
            margin-bottom: 18px;
        }
        .form-group-custom .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4a6fa5;
            margin-bottom: 8px;
            display: block;
        }
        .form-group-custom .form-control {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 14px;
            font-size: 0.95rem;
        }
        .form-group-custom .form-control:focus {
            box-shadow: none;
            border-color: #4a6fa5;
        }

        /* 로그인 유지 및 비번찾기 */
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
            color: #666;
        }
        .login-options a {
            text-decoration: none;
            color: #4a6fa5;
        }

        /* 로그인 버튼 */
        .btn-signin {
            background-color: #4a6fa5;
            color: white;
            border: none;
            padding: 13px 40px;
            font-size: 1rem;
            border-radius: 5px;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-signin:hover {
            background-color: #3b5a8e;
            color: white;
        }

        /* 간편 로그인 구분선 */
        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 40px 0 30px 0;
            color: #aaa;
            font-size: 0.9rem;
        }
        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        .separator span {
            padding: 0 15px;
        }

        /* [핵심] 소셜 로그인 이미지 버튼 스타일 (둥근 네모) */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px; /* 버튼 사이 간격 */
        }
        .social-btn-img {
            display: inline-block;
            transition: transform 0.2s;
            /* [변경] 원형 배경 제거, 끝이 둥근 네모 스타일 정의 */
            width: 44px;  /* 컴팩트한 크기로 축소 */
            height: 44px;
            border-radius: 10px; /* [변경] 끝이 동그란 네모 형태 */
            overflow: hidden; /* 이미지가 배경을 벗어나지 않게 */
            border: 1px solid #eee; /* 아주 연한 테두리 */
        }
        .social-btn-img:hover {
            transform: scale(1.08); /* 마우스 올렸을 때 살짝 커짐 */
        }
        /* 로고 이미지 크기 조정 (크기 동일화 및 object-fit) */
        .social-btn-img img {
            width: 100%;  /* 부모 요소(44px)에 꽉 차게 */
            height: 100%;
            object-fit: cover; /* [핵심] 정사각형 비율에 맞춰 이미지를 꽉 채움 */
        }

        /* 하단 링크 */
        .signup-link {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
        }
        .signup-link a {
            color: #4a6fa5;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white fixed-top px-4">
        <a class="navbar-brand fw-bold tracking-wide text-dark" href="/" style="text-decoration: none;">SEOYEON TOUR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link" href="/introduce">소개</a></li>
                <li class="nav-item"><a class="nav-link" href="/event">이벤트</a></li>
                <li class="nav-item"><a class="nav-link" href="/honeymoon-europe">허니문-유럽</a></li>
                <li class="nav-item"><a class="nav-link" href="/honeymoon-resort">허니문-휴양지</a></li>
                <li class="nav-item"><a class="nav-link" href="/group">단체여행</a></li>
                <li class="nav-item"><a class="nav-link" href="/package">패키지</a></li>
                <li class="nav-item"><a class="nav-link text-primary fw-bold" href="/signup-page">회원가입하기</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-container">
            
            <h1 class="welcome-title">Welcome!</h1>

            <form action="/login" method="POST">
                <div class="form-group-custom">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" placeholder="Email" required>
                </div>
                
                <div class="form-group-custom">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Password" required>
                </div>

                <div class="login-options">
                    <div>
                        <input type="checkbox" id="remember" class="form-check-input me-1">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-signin">Sign in</button>
            </form>

            <div class="separator">
                <span>Or sign in with</span>
            </div>

            <div class="social-icons">
                <a href="#" class="social-btn-img" title="네이버로 로그인하기">
                    <img src="/images/naver_logo.png" alt="네이버 로그인">
                </a>
                <a href="#" class="social-btn-img" title="카카오로 로그인하기">
                    <img src="/images/kakao_logo.png" alt="카카오 로그인">
                </a>
            </div>

            <div class="signup-link">
                <a href="/signup-page">Create a new account</a>
            </div>
        </div>
    </div>

    <footer class="py-5 text-center text-muted small border-top bg-white">
        <div class="fw-medium text-dark mb-1">SEOYEON TOUR</div>
        Tel: 010-298-7368 , Email: angelo2001@naver.com<br>
        <div class="mt-3">© 2026 Seoyeon Tour. All rights reserved.</div>
        사업자 대표: 원서연,정유진
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
