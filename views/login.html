<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - SEOYEON TOUR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6f7; /* 네비게이션과 대조되는 아주 옅은 그레이 배경 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* [변경] 네비게이션에서 로고 이름 제거를 위한 스타일 */
        .navbar-brand {
            visibility: hidden; /* 영역은 유지하되 보이지 않게 */
        }

        /* 중앙 정렬 컨테이너 */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 0; /* 네비바 고려 */
        }
        
        .login-container {
            width: 100%;
            max-width: 460px; /* 네이버와 비슷한 너비 */
            padding: 20px;
        }

        /* [변경] 로그인창 위 서연투어 로고 (네이버 스타일, 살짝 투명) */
        .brand-logo-inline {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: rgba(0, 0, 0, 0.65); /* 검은색에 65% 투명도 적용 */
            text-align: center;
            margin-bottom: 30px;
            display: block;
            text-decoration: none;
        }

        /* 로그인 카드 */
        .login-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px; /* 더 각진 네이버 스타일 */
            border: 1px solid #dadada;
        }

        /* [변경] 아이디/비밀번호 입력창 밀착 스타일 */
        .input-group-merged {
            border: 1px solid #dadada;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .input-group-merged .form-control {
            border: none;
            border-radius: 0;
            padding: 15px;
            font-size: 1rem;
        }
        .input-group-merged .form-control:focus {
            box-shadow: none;
            background-color: #faffbd !important; /* 네이버 특유의 포커스 색상 */
            z-index: 1; /* 포커스 된 입력창의 테두리가 보이게 */
            position: relative;
        }
        .input-group-merged .form-control-id {
            border-bottom: 1px solid #dadada;
        }

        /* 로그인 버튼 */
        .btn-login {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 4px;
        }
        .btn-login:hover {
            background-color: #000;
            color: white;
        }

        /* [변경] 간편 로그인 구분선 (겹침 해결) */
        .social-login-separator {
            position: relative;
            text-align: center;
            margin: 35px 0 25px 0;
        }
        .social-login-separator hr {
            border: 0;
            border-top: 1px solid #dadada;
            margin: 0;
        }
        .social-login-separator .separator-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            padding: 0 15px;
            font-size: 0.85rem;
            color: #888;
        }

        /* [변경] 소셜 로그인 버튼 스타일 (색감 옅게, 문구 변경) */
        .btn-social {
            width: 100%;
            margin-bottom: 10px;
            padding: 13px;
            border-radius: 4px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-social:hover {
            opacity: 0.8;
        }
        
        /* 옅게 조정한 카카오 색상 */
        .btn-kakao {
            background-color: #fef01b; /* 조금 더 부드러운 노랑 */
            color: #3c1e1e;
            border: none;
        }
        
        /* 옅게 조정한 네이버 색상 */
        .btn-naver {
            background-color: #1dc800; /* 조금 더 맑고 연한 초록 */
            color: white;
            border: none;
        }

    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm fixed-top px-4">
        <a class="navbar-brand fw-bold tracking-wide" href="/">SEOYEON TOUR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link" href="/introduce">소개</a></li>
                <li class="nav-item"><a class="nav-link" href="/event">이벤트</a></li>
                <li class="nav-item"><a class="nav-link" href="/honeymoon-europe">허니문-유럽</a></li>
                <li class="nav-item"><a class="nav-link" href="/honeymoon-resort">허니문-휴양지</a></li>
                <li class="nav-item"><a class="nav-link" href="/group">단체여행</a></li>
                <li class="nav-item"><a class="nav-link" href="/package">패키지</a></li>
                <li class="nav-item"><a class="nav-link" href="/reviews">후기</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact">온라인문의</a></li>
                <li class="nav-item"><a class="nav-link text-primary fw-bold" href="/signup-page">회원가입하기</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-container">
            
            <a href="/" class="brand-logo-inline">SEOYEON TOUR</a>

            <div class="login-card shadow-sm">
                <form action="/login" method="POST">
                    
                    <div class="input-group-merged">
                        <input type="text" class="form-control form-control-id" id="user_id" name="user_id" placeholder="아이디" required>
                        <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호" required>
                    </div>

                    <button type="submit" class="btn btn-login w-100 mb-3 shadow-sm">로그인</button>
                </form>

                <div class="text-center mt-2 mb-2">
                    <span class="text-muted small">아직 계정이 없으신가요?</span>
                    <a href="/signup-page" class="ms-2 fw-bold text-decoration-none" style="color: #0d6efd;">회원가입하기</a>
                </div>

                <div class="social-login-separator">
                    <hr>
                    <span class="separator-text">간편 로그인</span>
                </div>
                
                <div class="social-login-buttons">
                    <a href="#" class="btn-social btn-kakao shadow-sm">
                        <img src="https://developers.kakao.com/assets/img/reference/alphabets/symbol/kakao_caption.png" width="18" class="me-2"> 카카오로 로그인하기
                    </a>
                    <a href="#" class="btn-social btn-naver shadow-sm">
                        <span class="fw-bold me-2" style="font-size: 1.1rem;">N</span> 네이버로 로그인하기
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-5 text-center text-muted small border-top bg-white">
        <div class="fw-medium text-dark mb-1">SEOYEON TOUR</div>
        Tel: 010-298-7368 , Email: angelo2001@naver.com<br>
        <div class="mt-3">© 2026 Seoyeon Tour. All rights reserved.</div>
        사업자 대표: 원서연,정유진
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
