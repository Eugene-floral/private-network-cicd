<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - SEOYEON TOUR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 배너 유지 */
        .navbar {
            border-bottom: 1px solid #eee;
        }

        /* 중앙 정렬 컨테이너 */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 100px; /* 네비바 높이만큼 여백 */
            padding-bottom: 50px;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* Welcome! 타이틀 스타일 */
        .welcome-title {
            font-size: 3.2rem;
            font-weight: 400;
            color: #4a6fa5;
            text-align: center;
            margin-bottom: 45px;
            letter-spacing: -1px;
        }

        /* 입력창 라벨 및 스타일 */
        .form-group-custom {
            margin-bottom: 20px;
        }
        .form-group-custom .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4a6fa5;
            margin-bottom: 8px;
            display: block;
        }
        .form-group-custom .form-control {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 14px;
            font-size: 0.95rem;
        }
        .form-group-custom .form-control:focus {
            box-shadow: none;
            border-color: #4a6fa5;
        }

        /* 로그인 유지 및 비번찾기 */
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
            color: #666;
        }
        .login-options a {
            text-decoration: none;
            color: #4a6fa5;
        }

        /* 로그인 버튼 */
        .btn-signin {
            background-color: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1rem;
            border-radius: 5px;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-signin:hover {
            background-color: #3b5a8e;
            color: white;
        }

        /* 간편 로그인 구분선 */
        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 40px 0 30px 0;
            color: #aaa;
            font-size: 0.9rem;
        }
        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        .separator span {
            padding: 0 15px;
        }

        /* 소셜 로그인 버튼 (카카오 & 네이버 원형 로고) */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .social-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.2s;
            border: 1px solid #eee;
        }
        .social-btn:hover {
            transform: scale(1.1);
        }
        /* 카카오: 이미지 깨짐 방지를 위해 색상과 텍스트로 구현 */
        .btn-kakao {
            background-color: #FEE500;
            color: #3C1E1E;
            border: none;
        }
        /* 네이버: 이미지 깨짐 방지를 위해 색상과 텍스트로 구현 */
        .btn-naver {
            background-color: #03C75A;
            color: white;
            border: none;
        }

        /* 하단 링크 */
        .signup-link {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
        }
        .signup-link a {
            color: #4a6fa5;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm fixed-top px-4">
        <a class="navbar-brand fw-bold tracking-wide text-dark" href="/" style="text-decoration: none;">SEOYEON TOUR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link" href="/introduce">소개</a></li>
                <li class="nav-item"><a class="nav-link" href="/event">이벤트</a></li>
                <li class="nav-item"><a class="nav-link" href="/honeymoon-europe">허니문-유럽</a></li>
                <li class="nav-item"><a class="nav-link" href="/honeymoon-resort">허니문-휴양지</a></li>
                <li class="nav-item"><a class="nav-link" href="/group">단체여행</a></li>
                <li class="nav-item"><a class="nav-link" href="/package">패키지</a></li>
                <li class="nav-item"><a class="nav-link" href="/reviews">후기</a></li>
                <li class="nav-item"><a class="nav-link text-primary fw-bold" href="/signup-page">회원가입하기</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-container">
            
            <h1 class="welcome-title">Welcome!</h1>

            <form action="/login" method="POST">
                <div class="form-group-custom">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" placeholder="Email" required>
                </div>
                
                <div class="form-group-custom">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Password" required>
                </div>

                <div class="login-options">
                    <div>
                        <input type="checkbox" id="remember" class="form-check-input me-1">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-signin">Sign in</button>
            </form>

            <div class="separator">
                <span>Or sign in with</span>
            </div>

            <div class="social-icons">
                <a href="#" class="social-btn btn-naver" title="네이버로 로그인하기">N</a>
                <a href="#" class="social-btn btn-kakao" title="카카오로 로그인하기">K</a>
            </div>

            <div class="signup-link">
                <a href="/signup-page">Create a new account</a>
            </div>
        </div>
    </div>

    <footer class="py-5 text-center text-muted small border-top bg-white">
        <div class="fw-medium text-dark mb-1">SEOYEON TOUR</div>
        Tel: 010-298-7368 , Email: angelo2001@naver.com<br>
        <div class="mt-3">© 2026 Seoyeon Tour. All rights reserved.</div>
        사업자 대표: 원서연,정유진
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
