<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - SEOYEON TOUR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff; /* 배경 화이트 유지 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* 중앙 정렬을 위한 컨테이너 */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 0; /* 네비바 높이 고려 */
        }
        /* 로그인 카드: 화면의 약 1/5 수준 (최소 너비 설정으로 가독성 확보) */
        .login-card {
            width: 100%;
            max-width: 400px; /* 데스크탑 기준 1/5~1/4 수준의 너비 */
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #eee;
        }
        .btn-login {
            background-color: #333;
            color: white;
            border: none;
            padding: 12px;
            font-weight: 500;
        }
        .btn-login:hover {
            background-color: #000;
            color: white;
        }
        /* 소셜 로그인 스타일 */
        .social-login hr {
            margin: 30px 0;
            position: relative;
        }
        .social-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 0 15px;
            font-size: 0.85rem;
            color: #888;
        }
        .btn-social {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #333;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm fixed-top px-4">
        <a class="navbar-brand fw-bold tracking-wide" href="/">SEOYEON TOUR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link" href="/introduce">소개</a></li>
                <li class="nav-item"><a class="nav-link" href="/event">이벤트</a></li>
                <li class="nav-item"><a class="nav-link" href="/honeymoon-europe">허니문-유럽</a></li>
                <li class="nav-item"><a class="nav-link" href="/honeymoon-resort">허니문-휴양지</a></li>
                <li class="nav-item"><a class="nav-link" href="/group">단체여행</a></li>
                <li class="nav-item"><a class="nav-link" href="/package">패키지</a></li>
                <li class="nav-item"><a class="nav-link" href="/reviews">후기</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact">온라인문의</a></li>
                <li class="nav-item"><a class="nav-link text-primary fw-bold" href="/signup-page">회원가입하기</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-card shadow-sm">
            <div class="text-center mb-4">
                <h3 class="fw-bold">로그인</h3>
                <p class="text-muted small">서연투어에 오신 것을 환영합니다</p>
            </div>

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label for="user_id" class="form-label small text-muted">아이디</label>
                    <input type="text" class="form-control" id="user_id" name="user_id" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label small text-muted">비밀번호</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-login w-100 mb-3">로그인</button>
                
                <div class="text-center">
                    <a href="/signup-page" class="text-decoration-none small text-muted">아직 회원이 아니신가요? 회원가입</a>
                </div>
            </form>

            <div class="social-login">
                <hr>
                <span class="social-text">간편 로그인</span>
                
                <a href="#" class="btn-social" style="background-color: #FEE500; border: none;">
                    <img src="https://developers.kakao.com/assets/img/reference/alphabets/symbol/kakao_caption.png" width="20" class="me-2"> 카카오 로그인
                </a>
                <a href="#" class="btn-social" style="background-color: #03C75A; color: white; border: none;">
                    <span class="fw-bold me-2" style="font-size: 1.1rem;">N</span> 네이버 로그인
                </a>
            </div>
        </div>
    </div>

    <footer class="py-5 text-center text-muted small border-top bg-white">
        <div class="fw-medium text-dark mb-1">SEOYEON TOUR</div>
        Tel: 010-298-7368 , Email: angelo2001@naver.com<br>
        <div class="mt-3">© 2026 Seoyeon Tour. All rights reserved.</div>
        사업자 대표: 원서연,정유진
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
