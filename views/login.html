<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - SEOYEON TOUR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff; /* [변경] 전체 배경 하얀색 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* [변경] 상단 배너/로고 영역 삭제 (가리기) */
        .navbar {
            display: none;
        }

        /* 중앙 정렬 컨테이너 */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
        }
        
        .login-container {
            width: 100%;
            max-width: 480px; /* 조금 더 넓게 설정 */
            padding: 20px;
        }

        /* [변경] 상단 타이틀 "Welcome!" */
        .welcome-title {
            font-size: 3.5rem;
            font-weight: 300; /* 가벼운 서체 */
            color: #4a6fa5; /* 블루 톤 */
            text-align: center;
            margin-bottom: 40px;
        }

        /* 로그인 카드 (스타일 단순화) */
        .login-card {
            background-color: #ffffff;
            padding: 0px; /* 패딩 삭제 */
            border: none; /* 테두리 삭제 */
        }

        /* [변경] 입력창 라벨/입력창 스타일 */
        .form-group-custom {
            margin-bottom: 25px;
        }
        .form-group-custom .form-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #4a6fa5; /* 블루 톤 */
            margin-bottom: 8px;
            display: block;
        }
        .form-group-custom .form-control {
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            padding: 15px;
            font-size: 1rem;
            color: #888;
        }
        .form-group-custom .form-control:focus {
            box-shadow: none;
            border-color: #4a6fa5; /* 포커스 시 블루 톤 */
        }

        /* 로그인 버튼 (블루 톤) */
        .btn-login {
            background-color: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 4px;
            width: auto; /* 컴팩트한 너비 */
        }
        .btn-login:hover {
            background-color: #3b5a8e;
            color: white;
        }

        /* [변경] 로그인 유지 & 비밀번호 찾기 */
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .remember-forgot .form-check-label {
            color: #4a6fa5;
            font-weight: 500;
        }
        .remember-forgot .forgot-link {
            text-decoration: none;
            color: #4a6fa5;
        }

        /* [변경] 소셜 로그인 구분선 */
        .social-login-separator {
            position: relative;
            text-align: center;
            margin: 50px 0 30px 0;
        }
        .social-login-separator hr {
            border: 0;
            border-top: 1px solid #dadada;
            margin: 0;
        }
        .social-login-separator .separator-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            padding: 0 15px;
            font-size: 0.95rem;
            color: #a0a0a0;
            font-weight: 300;
        }

        /* [변경] 소셜 로그인 버튼 (로고 아이콘) */
        .social-login-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .btn-social-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid #d9d9d9;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-social-icon:hover {
            background-color: #f5f5f5;
        }

        /* [변경] 하단 회원가입 링크 */
        .create-account-link {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
        }
        .create-account-link a {
            text-decoration: underline;
            color: #4a6fa5;
        }

    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            
            <div class="welcome-title">Welcome!</div>

            <div class="login-card">
                <form action="/login" method="POST">
                    
                    <div class="form-group-custom">
                        <label for="user_id" class="form-label">Email</label>
                        <input type="text" class="form-control" id="user_id" name="user_id" placeholder="Email" required>
                    </div>
                    <div class="form-group-custom">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                    </div>

                    <div class="remember-forgot">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-login mb-3">Sign in</button>
                </form>

                <div class="social-login-separator">
                    <hr>
                    <span class="separator-text">Or sign in with</span>
                </div>
                
                <div class="social-login-buttons">
                    <a href="#" class="btn-social-icon btn-google">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                    </a>
                    <a href="#" class="btn-social-icon btn-apple">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" width="20">
                    </a>
                </div>

                <div class="create-account-link">
                    <a href="/signup-page">Create a new account</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-5 text-center text-muted small border-top bg-white">
        <div class="fw-medium text-dark mb-1">SEOYEON TOUR</div>
        Tel: 010-298-7368 , Email: angelo2001@naver.com<br>
        <div class="mt-3">© 2026 Seoyeon Tour. All rights reserved.</div>
        사업자 대표: 원서연,정유진
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
