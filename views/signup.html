<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - SEOYEON TOUR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 배너 유지 */
        .navbar { border-bottom: 1px solid #eee; }

        .signup-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 120px;
            padding-bottom: 80px;
        }

        .signup-container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .signup-title {
            font-size: 2.8rem;
            font-weight: 300;
            color: #4a6fa5;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        /* 네이버 스타일: 입력창 그룹화 */
        .input-group-container {
            border: 1px solid #dadada;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .input-row {
            position: relative;
            background-color: #fff;
        }

        .input-row:not(:last-child) {
            border-bottom: 1px solid #dadada;
        }

        .input-row label {
            position: absolute;
            left: 15px;
            top: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #4a6fa5;
            z-index: 10;
        }

        .input-row .form-control {
            border: none;
            border-radius: 0;
            padding: 28px 15px 10px 15px; /* 라벨 공간 확보 */
            font-size: 0.95rem;
            box-shadow: none !important;
        }

        .input-row .form-control:focus {
            background-color: #f8faff;
        }

        /* 가입하기 버튼 - 로그인창과 통일 */
        .btn-signup {
            background-color: #4a6fa5;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 6px;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-signup:hover {
            background-color: #3b5a8e;
            color: white;
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #666;
        }

        .footer-link a {
            color: #4a6fa5;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white fixed-top px-4">
        <a class="navbar-brand fw-bold tracking-wide text-dark" href="/">SEOYEON TOUR</a>
        <div class="ms-auto">
            <a href="/login-page" class="btn btn-outline-secondary btn-sm">로그인으로 돌아가기</a>
        </div>
    </nav>

    <div class="signup-wrapper">
        <div class="signup-container">
            <h1 class="signup-title">Join us!</h1>

            <form action="/signup" method="POST">
                <div class="input-group-container">
                    <div class="input-row">
                        <label>ID</label>
                        <input type="text" class="form-control" name="user_id" placeholder="아이디를 입력하세요" required>
                    </div>
                    <div class="input-row">
                        <label>PASSWORD</label>
                        <input type="password" class="form-control" name="password" placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <div class="input-row">
                        <label>CONFIRM PASSWORD</label>
                        <input type="password" class="form-control" name="confirm_password" placeholder="비밀번호를 다시 입력하세요" required>
                    </div>
                </div>

                <div class="input-group-container">
                    <div class="input-row">
                        <label>NAME</label>
                        <input type="text" class="form-control" name="name" placeholder="이름" required>
                    </div>
                    <div class="input-row">
                        <label>EMAIL</label>
                        <input type="email" class="form-control" name="email" placeholder="이메일 주소" required>
                    </div>
                    <div class="input-row">
                        <label>PHONE</label>
                        <input type="tel" class="form-control" name="phone" placeholder="휴대폰 번호 (- 제외)" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-signup">가입하기</button>
            </form>

            <div class="footer-link">
                이미 계정이 있으신가요? <a href="/login-page">로그인하기</a>
            </div>
        </div>
    </div>

    <footer class="py-5 text-center text-muted small border-top bg-white">
        <div class="fw-medium text-dark mb-1">SEOYEON TOUR</div>
        Tel: 010-298-7368 | Email: angelo2001@naver.com<br>
        <div class="mt-3">© 2026 Seoyeon Tour. All rights reserved.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
