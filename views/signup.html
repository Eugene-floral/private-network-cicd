<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - SEOYEON TOUR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar { border-bottom: 1px solid #eee; }
        .signup-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 0 80px 0;
        }
        .signup-container { width: 100%; max-width: 460px; padding: 20px; }
        .signup-title {
            font-size: 2.8rem;
            font-weight: 300;
            color: #4a6fa5;
            text-align: center;
            margin-bottom: 40px;
        }

        /* 네이버식 그룹 스타일 */
        .input-group-container {
            border: 1px solid #dadada;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .input-row {
            position: relative;
            background-color: #fff;
            border-bottom: 1px solid #dadada;
        }
        .input-row:last-child { border-bottom: none; }
        .input-row label {
            position: absolute;
            left: 15px;
            top: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #4a6fa5;
            text-transform: uppercase;
        }
        .input-row .form-control, .input-row .form-select {
            border: none;
            border-radius: 0;
            padding: 25px 15px 10px 15px;
            font-size: 0.95rem;
            box-shadow: none !important;
        }

        /* 성별 선택 (남/여 두 칸) */
        .gender-group {
            display: flex;
            background-color: #fff;
            border-bottom: 1px solid #dadada;
        }
        .gender-item {
            flex: 1;
            position: relative;
        }
        .gender-item:first-child { border-right: 1px solid #dadada; }
        .gender-item input[type="radio"] {
            display: none;
        }
        .gender-item label {
            display: block;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: #888;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .gender-item input[type="radio"]:checked + label {
            background-color: #f8faff;
            color: #4a6fa5;
            font-weight: 700;
        }

        .btn-signup {
            background-color: #4a6fa5;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 6px;
            width: 100%;
            margin-top: 10px;
        }
        .footer-link { text-align: center; margin-top: 25px; font-size: 0.9rem; }
        .footer-link a { color: #4a6fa5; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white fixed-top px-4">
        <a class="navbar-brand fw-bold text-dark" href="/">SEOYEON TOUR</a>
    </nav>

    <div class="signup-wrapper">
        <div class="signup-container">
            <h1 class="signup-title">Join us!</h1>

            <form action="/signup" method="POST">
                <div class="input-group-container">
                    <div class="input-row">
                        <label>ID</label>
                        <input type="text" class="form-control" name="user_id" placeholder="아이디" required>
                    </div>
                    <div class="input-row">
                        <label>PASSWORD</label>
                        <input type="password" class="form-control" name="password" placeholder="비밀번호" required>
                    </div>
                </div>

                <div class="input-group-container">
                    <div class="input-row">
                        <label>NAME</label>
                        <input type="text" class="form-control" name="name" placeholder="이름" required>
                    </div>
                    <div class="gender-group">
                        <div class="gender-item">
                            <input type="radio" name="gender" value="male" id="male" checked>
                            <label for="male">남성</label>
                        </div>
                        <div class="gender-item">
                            <input type="radio" name="gender" value="female" id="female">
                            <label for="female">여성</label>
                        </div>
                    </div>
                    <div class="input-row">
                        <label>BIRTHDAY</label>
                        <input type="date" class="form-control" name="birth_date" required>
                    </div>
                </div>

                <div class="input-group-container">
                    <div class="input-row">
                        <label>EMAIL</label>
                        <input type="email" class="form-control" name="email" placeholder="이메일 주소" required>
                    </div>
                    <div class="input-row">
                        <label>PHONE</label>
                        <input type="tel" class="form-control" name="phonenum" placeholder="휴대폰 번호" required>
                    </div>
                    <div class="input-row">
                        <label>ADDRESS</label>
                        <input type="text" class="form-control" name="address" placeholder="주소" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-signup">가입하기</button>
            </form>

            <div class="footer-link">
                이미 계정이 있으신가요? <a href="/login">로그인</a>
            </div>
        </div>
    </div>

</body>
</html>
